<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<title>Touch-Timer</title>
<style>
html,body{
  margin:0;
  height:100%;
  display:grid;
  grid-template-columns: 260px 16px 1fr 16px 140px;
  font-family:sans-serif;
}
#left{
  background:#f3f3f3;
  border-radius:20px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
  margin:1rem;
  padding:1rem 0;
  display:flex;
  flex-direction:column;
  align-items:center;
}
#left button{
  width:80%;
  padding:1.2rem 0;
  font-size:1.8rem;
  border:0;
  border-radius:12px;
  background:#d0d0d0;
  margin-bottom:1rem;
  transition:background .2s;
}
#left button:last-child{margin-bottom:0;}
#left button:hover,
#left button:active{background:#bcbcbc;}
#right{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}
#display{
  font-size:clamp(8rem,12vw,18rem);
  font-weight:600;
  margin-bottom:2rem;
  white-space:nowrap;
}
#stop{
  background:#c00;
  color:#fff;
  font-size:2rem;
  padding:2rem 10rem;
  border:0;
  border-radius:12px;
  transition:opacity .2s;
}
#stop:hover,
#stop:active{opacity:.85;}

/* ---- Status-Spalte ---- */
#status{
  display:flex;
  flex-direction:column;
  justify-content:flex-start;   /* oben beginnen */
  align-items:center;
  gap:1.2rem;
  margin:1rem 1rem 1rem 0;
  padding-top:1.5rem;            /* kleiner Abstand vom Rand */
}
.status-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.4rem;
}
.status-box{
  width:64px;
  height:64px;
  border-radius:10px;
  opacity:0.45;
  transition:opacity .3s, box-shadow .3s;
}
.status-box.active{
  opacity:1;
  box-shadow:0 0 16px 4px rgba(0,0,0,0.18);
}
.status-label{
  font-size:0.72rem;
  color:#555;
  text-align:center;
  line-height:1.2;
  max-width:72px;
}
#box-green  { background:#00FF00; }
#box-yellow { background:#FFFF00; }
#box-orange { background:#FF7F00; }
#box-red    { background:#FF0000; }
#blinkbox-red    { background:#ff6666; }

@keyframes softBlink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.15; }
}

#blinkbox-red.active {
  animation: softBlink 1s ease-in-out infinite;
  opacity: 1; /* überschreibt das Standard-0.45 */
}

</style>
</head>
<body>

<div id="left">
  {% for t in timers %}
  <button class="start" data-min="{{t}}">{{t}} min</button>
  {% endfor %}
</div>

<div></div><!-- Gap -->

<div id="right">
  <div id="display">00:00</div>
  <button id="stop">STOP</button>
</div>

<div></div><!-- Gap -->

<div id="status">
  <div class="status-item">
    <div class="status-box" id="box-green"></div>
    <div class="status-label">&gt; 5 min</div>
  </div>
  <div class="status-item">
    <div class="status-box" id="box-yellow"></div>
    <div class="status-label">&lt; 5 min</div>
  </div>
  <div class="status-item">
    <div class="status-box" id="box-orange"></div>
    <div class="status-label">&lt; 1 min</div>
  </div>
  <div class="status-item">
    <div class="status-box" id="box-red"></div>
    <div class="status-label">Time over</div>
  </div>
  <div class="status-item">
    <div class="status-box" id="blinkbox-red"></div>
    <div class="status-label">>30sec Over Time</div>
  </div>
</div>

<script>
let endMs = null;
const display = document.getElementById("display");
const boxes = {
  green:  document.getElementById("box-green"),
  yellow: document.getElementById("box-yellow"),
  orange: document.getElementById("box-orange"),
  red:    document.getElementById("box-red"),
  blinkRed:    document.getElementById("blinkbox-red"),
};

function setActiveBox(name) {
  Object.entries(boxes).forEach(([key, el]) => {
    el.classList.toggle("active", key === name);
  });
}

function tick() {
  if (!endMs) return;
  const diff = Math.round((endMs - Date.now()) / 1000);
  const sign = diff < 0 ? "-" : "";
  const abs  = Math.abs(diff);
  const m = String(Math.floor(abs / 60)).padStart(2, "0");
  const s = String(abs % 60).padStart(2, "0");
  display.textContent = `${sign}${m}:${s}`;

  // Update status indicator
  if      (diff < -30)  setActiveBox("blinkRed");   // ← neu, vor "red"
  else if (diff < 0)    setActiveBox("red");
  else if (diff < 60)   setActiveBox("orange");
  else if (diff < 300)  setActiveBox("yellow");
  else                  setActiveBox("green");
}

setInterval(tick, 250);

document.querySelectorAll(".start").forEach(btn => {
  btn.onclick = () => fetch(`/start/${btn.dataset.min}`)
    .then(r => r.json())
    .then(d => { endMs = d.end; });
});

document.getElementById("stop").onclick = () => fetch("/stop").then(() => {
  endMs = null;
  display.textContent = "00:00";
  setActiveBox(null); // alle aus
});
</script>
</body>
</html>
